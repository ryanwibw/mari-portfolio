name: Deploy Portfolio ke cPanel

# Script berjalan otomatis saat ada kode yang di-push ke branch 'main'
on:
  push:
    branches:
      - main 

jobs:
  web-deploy:
    name: 🎉 Deploy Web
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: 📦 Install Dependencies
      run: npm install

    - name: 🎨 Build Astro & Tailwind
      run: npm run build

    - name: 🚀 Sync files to cPanel via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Sangat penting: Hanya upload folder hasil build dari Astro
        local-dir: ./dist/